<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e0c0a"/>
      <stop offset="1" stop-color="#050403"/>
    </linearGradient>

    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9aa72"/>
      <stop offset="1" stop-color="#8f5a32"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="42" fill="url(#bg)"/>

  <!-- Soft glow -->
  <circle cx="90" cy="90" r="65" fill="url(#accent)" opacity="0.12"/>

  <!-- Coffee cup -->
  <path d="M55 75h45a15 15 0 0 1 0 30H55V75Z"
        fill="none"
        stroke="#f7eadb"
        stroke-width="6"
        stroke-linejoin="round"/>

  <!-- Handle -->
  <path d="M100 80h10a10 10 0 0 1 0 20h-10"
        fill="none"
        stroke="#f7eadb"
        stroke-width="6"
        stroke-linecap="round"/>

  <!-- Base -->
  <path d="M60 115h60"
        stroke="#c79058"
        stroke-width="6"
        stroke-linecap="round"/>

  <!-- Steam -->
  <path d="M70 60c0-6 6-6 6-12M95 60c0-6 6-6 6-12"
        stroke="#c79058"
        stroke-width="4"
        stroke-linecap="round"/>

  <!-- Glass shine overlay -->
  <rect width="180" height="90" rx="42" fill="url(#glass)"/>
</svg>