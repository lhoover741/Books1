<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Glow Beauty Bar</title>
<link rel="stylesheet" href="/demo/beauty-clean.css" />
</head>
<body>
<section class="g-hero">
<div class="wrap">
<h1>Skincare that <em>loves you back.</em></h1>
<p>Premium beauty website demo built to convert visitors into real clients.</p>
<p style="font-size:.85rem;color:#b8998d;margin-top:10px;">Limited build slots available this week.</p>
</div>
</section>
<section class="g-section">
<div class="wrap" style="text-align:center">
<h2>Clear, affordable packages.</h2>
<div class="g-service-grid">
<div class="g-service"><h3>Starter</h3><strong>$125</strong></div>
<div class="g-service"><h3>Business</h3><strong>$300</strong></div>
<div class="g-service"><h3>Premium</h3><strong>$600+</strong></div>
</div>
</div>
</section>
<section class="g-cta">
<div class="wrap">
<form id="beautyLeadForm">
<input name="name" placeholder="Your name" required>
<input name="email" placeholder="Your email" required>
<textarea name="details" placeholder="What do you need?" required></textarea>
<button>Get My Website Plan</button>
<p class="g-form-msg"></p>
</form>
</div>
</section>
<script src="/script.js"></script>
</body>
</html>
