<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>Creator Dashboard</title><link rel="stylesheet" href="/creator/creator.css"></head><body><div class="creator-shell"><div class="creator-top"><div class="brand"><div class="mark">B&B</div><div><strong>Creator Portal</strong><span>Books and Brews</span></div></div><div class="nav"><a class="btn" href="/">Home</a><button class="btn" onclick="logout()">Logout</button></div></div><section class="hero"><p class="kicker">Creator Dashboard</p><h1 id="name">Loading...</h1><p id="status" class="pill">Status: Pending</p></section><div class="stats"><div class="stat"><span>Profile</span><strong id="profileScore">0%</strong></div><div class="stat"><span>Status</span><strong id="statusShort">Pending</strong></div><div class="stat"><span>Submissions</span><strong id="submissionCount">0</strong></div></div><div class="grid"><div><div class="card"><h3>Creator Onboarding</h3><div id="onboarding" class="steps"></div></div><div class="card"><h3>Profile Builder</h3><div class="form"><label>Creator Name / Brand</label><input id="creatorBrand" placeholder="Example: Braids by Maya"><label>Niche</label><select id="creatorNiche"><option>Beauty</option><option>Fitness</option><option>Food</option><option>Fashion</option><option>Local Business</option><option>Other</option></select><label>Bio</label><textarea id="creatorBio" placeholder="Tell us what you create and who you serve..."></textarea><label>Instagram / TikTok / Portfolio Link</label><input id="creatorPortfolio" placeholder="https://..."><button class="btn primary" onclick="saveProfile()">Save Profile</button><p id="profileMsg"></p></div></div><div class="card"><h3>Submit Content</h3><div class="form"><input id="contentLink" placeholder="Portfolio / post link"><textarea id="contentNotes" placeholder="Describe your content"></textarea><button class="btn primary" onclick="submitContent()">Submit Content</button><p id="submitMsg"></p></div></div></div><div><div class="card"><h3>Application Progress</h3><div id="approvalBox" class="list"></div></div><div class="card"><h3>Creator Chat</h3><div id="messages" class="chat-feed"></div><div class="form"><textarea id="creatorMessage" placeholder="Message Books and Brews..."></textarea><button class="btn primary" onclick="sendCreatorMessage()">Send Message</button><p id="chatMsg"></p></div></div></div></div></div><script src="/creator/creator.js"></script></body></html>
