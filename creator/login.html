<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Creator Login</title>

<style>
body{
  background:#000;
  color:#fff;
  font-family:Arial;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  background:#111;
  padding:30px;
  border-radius:16px;
  width:340px;
  border:1px solid #333;
}

h2{
  margin-bottom:10px;
}

input{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #444;
  background:#0b0b0b;
  color:#fff;
  font-size:14px;
}

button{
  width:100%;
  padding:14px;
  margin-top:18px;
  background:#d3a16a;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

#msg{
  margin-top:12px;
  color:#aaa;
  font-size:13px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Creator Portal</h2>

  <input id="email" placeholder="Email">
  <input id="code" placeholder="Access Code">

  <button onclick="login()">Login</button>

  <p id="msg"></p>
</div>

<script>
async function login(){
  const email = document.getElementById('email').value.trim().toLowerCase();
  const code = document.getElementById('code').value.trim();
  const msg = document.getElementById('msg');

  if(!email || !code){
    msg.textContent = 'Enter email and code';
    return;
  }

  msg.textContent = 'Checking...';

  const res = await fetch('/api/creator/login', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ email, code })
  });

  const data = await res.json();

  if(!res.ok || !data.ok){
    msg.textContent = 'Invalid login';
    return;
  }

  localStorage.setItem('bb_creator_email', email);

  msg.textContent = 'Success… redirecting';

  setTimeout(() => {
    location.href = '/creator/dashboard.html';
  }, 600);
}
</script>

</body>
</html>
