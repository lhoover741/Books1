openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and session operations
  - name: client
    description: Client portal operations
  - name: leads
    description: Lead and CRM operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Sign in and create a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: End current session
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Session ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResult"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /client/project:
    get:
      operationId: getClientProject
      tags: [client]
      summary: Get client project and timeline
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Project payload for authenticated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientProjectPayload"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role to access client portal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /client/notifications:
    get:
      operationId: getClientNotifications
      tags: [client]
      summary: Get client activity notifications
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Activity notifications for authenticated client
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientNotification"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role to access client portal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /client/messages:
    get:
      operationId: getClientMessages
      tags: [client]
      summary: Get client messages
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Messages for authenticated client
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientMessage"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role to access client portal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /client/invoices:
    get:
      operationId: getClientInvoices
      tags: [client]
      summary: Get client invoices
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Invoices for authenticated client
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientInvoice"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role to access client portal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /client/files:
    get:
      operationId: getClientFiles
      tags: [client]
      summary: Get client files
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Files for authenticated client
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientFile"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role to access client portal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /client/support:
    post:
      operationId: postClientSupport
      tags: [client]
      summary: Create client support request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientSupportRequestInput"
      responses:
        "201":
          description: Support request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientSupportRequest"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role to access client portal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /client/portal/status:
    get:
      operationId: getClientPortalStatus
      tags: [client]
      summary: Get client project status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Project status for authenticated client
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientProjectStatus"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role to access client portal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /client/portal/timeline:
    get:
      operationId: getClientPortalTimeline
      tags: [client]
      summary: Get client activity timeline
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Timeline items for authenticated client
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientTimelineEntry"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role to access client portal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /client/portal/messages:
    get:
      operationId: getClientPortalMessages
      tags: [client]
      summary: Get client messages
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Messages for authenticated client
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientMessage"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role to access client portal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /client/portal/invoices:
    get:
      operationId: getClientPortalInvoices
      tags: [client]
      summary: Get client invoices
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Invoices for authenticated client
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientInvoice"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role to access client portal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /client/portal/files:
    get:
      operationId: getClientPortalFiles
      tags: [client]
      summary: Get client files
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Files for authenticated client
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientFile"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role to access client portal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /dashboard:
    get:
      operationId: getDashboard
      tags: [leads]
      summary: CRM dashboard summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard metrics and recent activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role to access admin dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /leads:
    get:
      operationId: getLeads
      tags: [leads]
      summary: List leads
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lead list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role to access admin leads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /leads/{leadId}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Get lead detail
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LeadId"
      responses:
        "200":
          description: Lead detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role to access admin leads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update lead status or notes
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LeadId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadUpdateInput"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role to update admin leads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Bearer
  parameters:
    LeadId:
      name: leadId
      in: path
      required: true
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    UserRole:
      type: string
      enum:
        - client
        - admin
    AuthUser:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/UserRole"
      required:
        - id
        - name
        - email
        - role
    LoginInput:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password
    AuthSession:
      type: object
      properties:
        accessToken:
          type: string
        expiresAt:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/AuthUser"
      required:
        - accessToken
        - expiresAt
        - user
    AuthMeResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        expiresAt:
          type: string
          format: date-time
      required:
        - user
        - expiresAt
    LogoutResult:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
    ClientProjectStatusType:
      type: string
      enum:
        - Planning
        - In Progress
        - In Review
        - Completed
        - On Hold
    ClientTimelineType:
      type: string
      enum:
        - Milestone
        - Update
        - Delivery
        - Billing
    ClientMessageSenderRole:
      type: string
      enum:
        - studio
        - client
    ClientNotificationType:
      type: string
      enum:
        - project
        - message
        - invoice
        - file
        - support
    ClientInvoiceStatus:
      type: string
      enum:
        - Draft
        - Sent
        - Paid
        - Overdue
    ClientFileCategory:
      type: string
      enum:
        - Contract
        - Deliverable
        - Asset
        - Invoice
        - Other
    ClientProjectStatus:
      type: object
      properties:
        id:
          type: string
        projectName:
          type: string
        status:
          $ref: "#/components/schemas/ClientProjectStatusType"
        progressPercent:
          type: number
        phase:
          type: string
        nextMilestone:
          type: string
        targetDate:
          type: string
      required:
        - id
        - projectName
        - status
        - progressPercent
        - phase
        - nextMilestone
        - targetDate
    ClientTimelineEntry:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        type:
          $ref: "#/components/schemas/ClientTimelineType"
        title:
          type: string
        description:
          type: string
        occurredAt:
          type: string
      required:
        - id
        - projectId
        - type
        - title
        - description
        - occurredAt
    ClientMessage:
      type: object
      properties:
        id:
          type: string
        subject:
          type: string
        preview:
          type: string
        senderRole:
          $ref: "#/components/schemas/ClientMessageSenderRole"
        isRead:
          type: boolean
        sentAt:
          type: string
      required:
        - id
        - subject
        - preview
        - senderRole
        - isRead
        - sentAt
    ClientInvoice:
      type: object
      properties:
        id:
          type: string
        invoiceNumber:
          type: string
        amountCents:
          type: number
        status:
          $ref: "#/components/schemas/ClientInvoiceStatus"
        dueDate:
          type: string
        issuedAt:
          type: string
        paidAt:
          type: string
          nullable: true
        downloadUrl:
          type: string
      required:
        - id
        - invoiceNumber
        - amountCents
        - status
        - dueDate
        - issuedAt
        - paidAt
        - downloadUrl
    ClientFile:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
          nullable: true
        name:
          type: string
        category:
          $ref: "#/components/schemas/ClientFileCategory"
        sizeBytes:
          type: number
        uploadedAt:
          type: string
        downloadUrl:
          type: string
      required:
        - id
        - projectId
        - name
        - category
        - sizeBytes
        - uploadedAt
        - downloadUrl
    ClientProjectPayload:
      type: object
      properties:
        project:
          allOf:
            - $ref: "#/components/schemas/ClientProjectStatus"
          nullable: true
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/ClientTimelineEntry"
      required:
        - project
        - timeline
    ClientNotification:
      type: object
      properties:
        id:
          type: string
        type:
          $ref: "#/components/schemas/ClientNotificationType"
        title:
          type: string
        description:
          type: string
        occurredAt:
          type: string
        isUnread:
          type: boolean
        actionLabel:
          type: string
        relatedId:
          type: string
          nullable: true
      required:
        - id
        - type
        - title
        - description
        - occurredAt
        - isUnread
        - actionLabel
        - relatedId
    ClientSupportPriority:
      type: string
      enum:
        - low
        - normal
        - high
    ClientSupportStatus:
      type: string
      enum:
        - Open
        - In Progress
        - Resolved
    ClientSupportRequestInput:
      type: object
      properties:
        subject:
          type: string
          minLength: 3
        message:
          type: string
          minLength: 10
        priority:
          $ref: "#/components/schemas/ClientSupportPriority"
        projectId:
          type: string
          nullable: true
      required:
        - subject
        - message
    ClientSupportRequest:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
          nullable: true
        subject:
          type: string
        message:
          type: string
        priority:
          $ref: "#/components/schemas/ClientSupportPriority"
        status:
          $ref: "#/components/schemas/ClientSupportStatus"
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - projectId
        - subject
        - message
        - priority
        - status
        - createdAt
        - updatedAt
    LeadStatus:
      type: string
      enum:
        - New
        - Contacted
        - Qualified
        - Quote Sent
        - Won
        - Nurture
    LeadSource:
      type: string
      enum:
        - Quote Request
        - Contact Inquiry
        - Referral
        - Discovery Call
    TimelineItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        timestamp:
          type: string
      required:
        - id
        - title
        - description
        - timestamp
    Lead:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        company:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        source:
          $ref: "#/components/schemas/LeadSource"
        status:
          $ref: "#/components/schemas/LeadStatus"
        budget:
          type: string
        projectType:
          type: string
        timeline:
          type: string
        value:
          type: number
        priority:
          type: string
          enum:
            - High
            - Medium
            - Low
        lastContact:
          type: string
        followUpDate:
          type: string
        nextStep:
          type: string
        notes:
          type: string
        createdAt:
          type: string
        activityTimeline:
          type: array
          items:
            $ref: "#/components/schemas/TimelineItem"
      required:
        - id
        - name
        - company
        - email
        - phone
        - source
        - status
        - budget
        - projectType
        - timeline
        - value
        - priority
        - lastContact
        - followUpDate
        - nextStep
        - notes
        - createdAt
        - activityTimeline
    LeadUpdateInput:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/LeadStatus"
        notes:
          type: string
        nextStep:
          type: string
        followUpDate:
          type: string
    ActivityItem:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        leadName:
          type: string
        timestamp:
          type: string
      required:
        - id
        - label
        - leadName
        - timestamp
    DashboardSummary:
      type: object
      properties:
        activeLeads:
          type: number
        pipelineValue:
          type: number
        quoteRequests:
          type: number
        responseRate:
          type: number
        statusCounts:
          type: object
          additionalProperties:
            type: number
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"
      required:
        - activeLeads
        - pipelineValue
        - quoteRequests
        - responseRate
        - statusCounts
        - recentActivity
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
