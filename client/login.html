<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Login | Books and Brews</title>
<link rel="stylesheet" href="/assets/css/styles.css">
<link rel="stylesheet" href="/client/portal.css">
</head>
<body class="portal-body">
<main class="portal-login-card">
<p class="portal-kicker">Client Portal</p>
<h1>Secure Client Login</h1>
<p>Use the email and access code sent by Books and Brews to view your project dashboard.</p>
<form id="clientLoginForm">
<label>Email</label>
<input id="clientEmail" type="email" required>
<label>Access Code</label>
<input id="clientCode" type="text" required>
<button type="submit">Log In</button>
<p id="clientLoginMsg"></p>
</form>
<a href="/">Back Home</a>
</main>
<script src="/client/portal.js"></script>
</body>
</html>
