<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Portal | Books and Brews</title>
<link rel="stylesheet" href="/client/portal.css">
</head>
<body class="portal-dashboard">
<div class="portal-shell">
  <div class="portal-top">
    <div>
      <p class="portal-kicker">Client Portal</p>
      <h1>Project Dashboard</h1>
      <p class="portal-muted" id="intro">Loading your project...</p>
    </div>
    <div class="portal-top-actions">
      <a href="/" class="portal-back">Home</a>
      <button class="portal-back logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <section class="portal-hero">
    <div class="brand-mark">
      <div class="brand-icon">B&B</div>
      <div><span class="brand-name">Books and Brews</span><span class="brand-tag">Smart Websites. Smooth Experience.</span></div>
    </div>
    <h1 id="projectTitle"></h1>
    <p id="details"></p>
    <span class="portal-pill" id="status"></span>
  </section>

  <div id="portal" class="portal-grid" style="display:none">
    <div>
      <div class="portal-card">
        <h2>Invoices</h2>
        <div id="invoices" class="portal-list"></div>
      </div>

      <div class="portal-card">
        <h2>Files</h2>
        <div id="files" class="portal-list"></div>
      </div>

      <div class="portal-card">
        <h2>Send a Message</h2>
        <textarea id="replyMessage" placeholder="Ask a question..."></textarea>
        <button class="portal-btn" onclick="sendReply()">Send</button>
        <p id="replyStatus"></p>
      </div>
    </div>

    <div>
      <div class="portal-card">
        <h2>Messages</h2>
        <div id="messages" class="portal-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
const lead=new URLSearchParams(location.search).get('lead')||localStorage.getItem('bb_lead');
function esc(v){return String(v??'')}
function logout(){localStorage.removeItem('bb_lead');location.href='/client/login.html'}
async function sendReply(){const msg=document.getElementById('replyMessage').value;if(!msg)return;replyStatus.textContent='Sending...';await fetch('/api/leads/'+lead+'/message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({subject:'Client Message',message:msg})});replyStatus.textContent='Sent';}
(async()=>{
const res=await fetch('/api/leads/'+lead);
const data=await res.json();
const l=data.lead;
projectTitle.textContent=l.project_type;
details.textContent=l.project_details;
status.textContent=l.status;
invoices.innerHTML=(data.invoices||[]).map(i=>'<div class="portal-item">'+i.invoice_number+'</div>').join('');
messages.innerHTML=(data.messages||[]).map(m=>'<div class="portal-item">'+m.message+'</div>').join('');
portal.style.display='grid';
})();
</script>
</body>
</html>
